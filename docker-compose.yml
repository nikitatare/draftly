version: '3.9'

services:

  app:
    build: .
    container_name: draftly_app

    ports:
      - "8001:8001"

    env_file:
      - .env

    depends_on:
      - db

    volumes:
      - .:/app

  db:
    image: postgres:15

    container_name: draftly_db

    restart: always

    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: draftly

    ports:
      - "5432:5432"

    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: